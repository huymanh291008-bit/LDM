<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Điều Khiển</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #16213e; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 300px; }
        input { padding: 10px; width: 80%; border-radius: 5px; border: none; margin-bottom: 10px; }
        button { background: #0f3460; color: white; border: 2px solid #533483; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin: 5px; width: 100%; transition: 0.3s; }
        button:hover { background: #533483; }
        .hidden { display: none; }
        .btn-active { border-color: #e94560; color: #e94560; }
    </style>
</head>
<body>

<div class="container" id="loginBox">
    <h3>Đăng nhập</h3>
    <input type="password" id="passInput" placeholder="Nhập mật khẩu...">
    <button onclick="checkPass()">Truy cập</button>
</div>

<div class="container hidden" id="mainApp">
    <h3>Menu Điều Khiển</h3>
    <button onclick="activate('Nhẹ Tâm 🚀')">Nhẹ Tâm 🚀</button>
    <button onclick="activate('120Hz 🍏')">120Hz 🍏</button>
    <button onclick="activate('Giảm Lố Đầu 🎯')">Giảm Lố Đầu 🎯</button>
</div>

<script>
    function checkPass() {
        const pass = document.getElementById('passInput').value;
        if (pass === 'duymanhvuafile') {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
        } else {
            alert('Sai mật khẩu rồi!');
        }
    }

    function activate(name) {
        alert('Đã bật chức năng: ' + name);
    }
</script>

</body>
</html>
