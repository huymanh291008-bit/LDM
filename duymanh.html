<!DOCTYPE html>
<html lang="vi">
<head>
    <style>
        body { background-color: #0a0c10; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 360px; background: #141a25; padding: 25px; border-radius: 30px; }
        .btn-find { width: 100%; padding: 18px; border-radius: 15px; border: none; background: linear-gradient(90deg, #38bdf8, #2563eb); color: white; font-weight: bold; cursor: pointer; }
        
        /* Hiệu ứng loading */
        #aiLoading { display: none; margin-top: 20px; text-align: center; }
        .progress-bar { width: 100%; height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .progress-fill { height: 100%; background: #38bdf8; width: 0%; transition: width 2s linear; }
        
        #resultArea { display: none; margin-top: 20px; }
        .res-item { background: #1e293b; padding: 12px; margin-bottom: 8px; border-radius: 12px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-find" id="searchBtn" onclick="startAnalysis()">🔍 TÌM ĐỘ NHẠY</button>

    <div id="aiLoading">
        <span style="font-size: 12px; color: #38bdf8;">Đang phân tích AI...</span>
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    </div>

    <div id="resultArea">
        <div id="resList"></div>
    </div>
</div>

<script>
    function startAnalysis() {
        const btn = document.getElementById('searchBtn');
        const loading = document.getElementById('aiLoading');
        const progress = document.getElementById('progress');
        const resultArea = document.getElementById('resultArea');

        // 1. Ẩn nút, hiện thanh loading
        btn.style.display = 'none';
        loading.style.display = 'block';
        resultArea.style.display = 'none';
        progress.style.width = '100%'; // Chạy đầy thanh trong 2 giây

        // 2. Đợi 2 giây rồi hiện kết quả
        setTimeout(() => {
            loading.style.display = 'none';
            resultArea.style.display = 'block';
            showResults();
        }, 2000);
    }

    function showResults() {
        const data = { "GENERAL": 170, "RED DOT": 141, "2x SCOPE": 128, "NÚT BẤN": 33 };
        const list = document.getElementById('resList');
        list.innerHTML = Object.entries(data).map(([k, v]) => `
            <div class="res-item">
                <span style="color:#94a3b8">${k}</span>
                <span style="color:#38bdf8; font-weight:bold">${v}</span>
            </div>
        `).join('');
    }
</script>
</body>
</html>
