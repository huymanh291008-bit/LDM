<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        /* CSS Định dạng */
        body {
            background-color: #0a0c10;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .container {
            width: 360px;
            background: #141a25;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .label { color: #64748b; font-size: 10px; font-weight: bold; margin-bottom: 10px; display: block; }

        /* Nút lựa chọn (iOS/Android) */
        .os-select { display: flex; gap: 10px; margin-bottom: 20px; }
        .os-btn {
            flex: 1; padding: 15px; border-radius: 15px; border: 1px solid #334155;
            background: #1e293b; color: white; cursor: pointer; text-align: center;
        }
        .os-btn.active { border-color: #38bdf8; background: #1e3a5a; }

        /* Dropdown */
        select {
            width: 100%; padding: 15px; border-radius: 15px; background: #1e293b;
            color: white; border: 1px solid #334155; margin-bottom: 20px; outline: none;
        }

        /* Grid Tình trạng */
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .status-btn {
            padding: 12px; border-radius: 12px; background: #1e293b;
            border: 1px solid #334155; color: #cbd5e1; font-size: 13px; cursor: pointer;
        }

        /* Nút TÌM ĐỘ NHẠY */
        .btn-find {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: linear-gradient(90deg, #38bdf8, #2563eb);
            color: white; font-weight: bold; font-size: 16px; cursor: pointer;
        }

        .reset-btn { text-align: center; margin-top: 15px; color: #64748b; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <span class="label">HỆ ĐIỀU HÀNH</span>
    <div class="os-select">
        <button class="os-btn active">🍎 iOS</button>
        <button class="os-btn">🤖 Android</button>
    </div>

    <span class="label">DÒNG IPHONE</span>
    <select>
        <option>iPhone 13 Pro Max</option>
    </select>

    <span class="label">TÌNH TRẠNG ĐANG GẶP (CHỌN NHIỀU)</span>
    <div class="status-grid">
        <button class="status-btn">↗ Lệch Đầu</button>
        <button class="status-btn">☁ Lạc Đạn</button>
        <button class="status-btn">⚡ Giật Tâm</button>
        <button class="status-btn">🟡 Nặng Tâm</button>
        <button class="status-btn">🔲 Rung Tay</button>
        <button class="status-btn">🏃 Trượt Địch</button>
    </div>

    <button class="btn-find">🔍 TÌM ĐỘ NHẠY</button>
    <div class="reset-btn">🔄 Reset về mặc định</div>
</div>

</body>
</html>
